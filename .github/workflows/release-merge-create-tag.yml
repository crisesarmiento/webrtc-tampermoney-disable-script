name: Release Merge Create Tag

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Release PR number to process (development -> main, already merged)"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-release-tag:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'development') || github.event_name == 'workflow_dispatch' }}
    concurrency:
      group: release-merge-tag-${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: false
    env:
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
      LINEAR_PROJECT_ID: ${{ secrets.LINEAR_PROJECT_ID }}
      GH_TOKEN: ${{ secrets.RELEASE_PAT }}  # Used by authenticated CLI/git operations in this job.
    steps:
      - name: Load release PR context
        id: pr
        uses: actions/github-script@v7
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            const isDispatch = context.eventName === 'workflow_dispatch';
            let pr;

            if (isDispatch) {
              const prNumber = Number(process.env.INPUT_PR_NUMBER || '0');
              if (!prNumber) {
                core.setFailed('workflow_dispatch requires numeric input pr_number');
                return;
              }
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              pr = response.data;
            } else {
              pr = context.payload.pull_request;
            }

            if (!pr) {
              core.setFailed('No pull request payload available.');
              return;
            }
            if (!pr.merged) {
              core.setFailed(`PR #${pr.number} is not merged.`);
              return;
            }
            if (pr.base?.ref !== 'main' || pr.head?.ref !== 'development') {
              core.setFailed(`PR #${pr.number} is ${pr.head?.ref} -> ${pr.base?.ref}; expected development -> main.`);
              return;
            }

            const mergeSha = pr.merge_commit_sha || '';
            if (!mergeSha) {
              core.setFailed(`PR #${pr.number} is missing merge_commit_sha.`);
              return;
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title || '');
            core.setOutput('pr_body', pr.body || '');
            core.setOutput('pr_url', pr.html_url || '');
            core.setOutput('merge_sha', mergeSha);
            core.setOutput('pr_labels', JSON.stringify((pr.labels || []).map((label) => (label?.name || '').trim()).filter(Boolean)));

      - name: Checkout merged release SHA
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0
          # Keep release tagging deterministic even if main advances after PR merge.
          ref: ${{ steps.pr.outputs.merge_sha }}

      - name: Validate configuration
        run: |
          set -euo pipefail
          if [ -z "${LINEAR_API_KEY:-}" ]; then
            echo "Missing required secret: LINEAR_API_KEY"
            exit 1
          fi
          if [ -z "${LINEAR_TEAM_ID:-}" ]; then
            echo "Missing required secret: LINEAR_TEAM_ID"
            exit 1
          fi
          if [ -z "${LINEAR_PROJECT_ID:-}" ]; then
            echo "Missing required secret: LINEAR_PROJECT_ID"
            exit 1
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing required secret: RELEASE_PAT (mapped to GH_TOKEN)"
            exit 1
          fi

      - name: Find existing release tag mapping comment on PR
        id: tag_mapping
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            const issueNumber = Number(`${{ steps.pr.outputs.pr_number }}`);
            const markerId = /<!--\s*linear-release-tag-ticket-id:([^\s>]+)\s*-->/i;
            const markerIdentifier = /<!--\s*linear-release-tag-ticket-identifier:([^\s>]+)\s*-->/i;
            const markerUrl = /<!--\s*linear-release-tag-ticket-url:([^\s>]+)\s*-->/i;
            const markerTag = /^-\s*Tag:\s*(v[0-9]+(?:\.[0-9]+){0,2})\s*$/im;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const found = comments.find((comment) => markerId.test(comment.body || ''));
            if (!found) {
              core.setOutput('comment_id', '');
              core.setOutput('linear_id', '');
              core.setOutput('linear_identifier', '');
              core.setOutput('linear_url', '');
              core.setOutput('tag_name', '');
              return;
            }

            const body = found.body || '';
            core.setOutput('comment_id', String(found.id));
            core.setOutput('linear_id', body.match(markerId)?.[1] || '');
            core.setOutput('linear_identifier', body.match(markerIdentifier)?.[1] || '');
            core.setOutput('linear_url', body.match(markerUrl)?.[1] || '');
            core.setOutput('tag_name', body.match(markerTag)?.[1] || '');

      - name: Build release context
        id: context
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr.outputs.pr_title }}
          PR_BODY: ${{ steps.pr.outputs.pr_body }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          MERGE_SHA: ${{ steps.pr.outputs.merge_sha }}
          PR_LABELS_JSON: ${{ steps.pr.outputs.pr_labels }}
          PRIOR_TAG_NAME: ${{ steps.tag_mapping.outputs.tag_name }}
        run: |
          set -euo pipefail

          normalize_version() {
            local raw="${1#v}"
            local major=0
            local minor=0
            local patch=0
            IFS='.' read -r major minor patch _ <<< "$raw"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"
            printf '%s.%s.%s' "$major" "$minor" "$patch"
          }

          bump_from_version() {
            local base="$1"
            local bump="$2"
            local major minor patch
            IFS='.' read -r major minor patch <<< "$base"
            case "$bump" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              *)
                patch=$((patch + 1))
                ;;
            esac
            printf '%s.%s.%s' "$major" "$minor" "$patch"
          }

          EXPLICIT_VERSION=""
          TITLE_RELEASE_VERSION="$(printf '%s\n' "$PR_TITLE" | grep -Eio 'release[^v]*v[0-9]+([.][0-9]+){0,2}' | grep -Eo 'v[0-9]+([.][0-9]+){0,2}' | head -n 1 || true)"
          BODY_DECLARED_VERSION="$(printf '%s\n' "$PR_BODY" | grep -Eio '^[[:space:]]*(release[[:space:]_-]*version|tag)[[:space:]]*:[[:space:]]*v[0-9]+([.][0-9]+){0,2}[[:space:]]*$' | grep -Eo 'v[0-9]+([.][0-9]+){0,2}' | head -n 1 || true)"
          if [ -n "$BODY_DECLARED_VERSION" ]; then
            EXPLICIT_VERSION="$BODY_DECLARED_VERSION"
          elif [ -n "$TITLE_RELEASE_VERSION" ]; then
            EXPLICIT_VERSION="$TITLE_RELEASE_VERSION"
          fi
          BUMP_LEVEL="patch"
          BUMP_SOURCE="label:patch"
          EXISTING_TAG_FOR_MERGE="$(git tag --list 'v*' --points-at "$MERGE_SHA" | sort -V | tail -n 1 || true)"
          PREVIOUS_TAG_FROM_PR="${PRIOR_TAG_NAME:-}"

          if [ -n "$EXPLICIT_VERSION" ]; then
            TAG_NAME="v$(normalize_version "$EXPLICIT_VERSION")"
            BUMP_SOURCE="explicit_pr_version"
          elif [ -n "$PREVIOUS_TAG_FROM_PR" ]; then
            TAG_NAME="$PREVIOUS_TAG_FROM_PR"
            BUMP_SOURCE="existing_tag_from_pr_comment"
          elif [ -n "$EXISTING_TAG_FOR_MERGE" ]; then
            TAG_NAME="$EXISTING_TAG_FOR_MERGE"
            BUMP_SOURCE="existing_tag_for_merge_sha"
          else
            if printf '%s' "${PR_LABELS_JSON:-[]}" | jq -e 'any(.[]?; test("^semver:major$"; "i"))' > /dev/null; then
              BUMP_LEVEL="major"
            elif printf '%s' "${PR_LABELS_JSON:-[]}" | jq -e 'any(.[]?; test("^semver:minor$"; "i"))' > /dev/null; then
              BUMP_LEVEL="minor"
            elif printf '%s' "${PR_LABELS_JSON:-[]}" | jq -e 'any(.[]?; test("^semver:patch$"; "i"))' > /dev/null; then
              BUMP_LEVEL="patch"
            fi
            BUMP_SOURCE="label:${BUMP_LEVEL}"
            LAST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)"
            if [ -z "$LAST_TAG" ]; then
              LAST_TAG="v0.0.0"
            fi
            BASE_VERSION="$(normalize_version "$LAST_TAG")"
            TAG_NAME="v$(bump_from_version "$BASE_VERSION" "$BUMP_LEVEL")"
          fi

          TAG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_NAME}"

          LINEAR_TITLE="[Release Tag ${TAG_NAME}] ${GITHUB_REPOSITORY}"
          LINEAR_DESCRIPTION="$(printf '%s\n' \
            "Automated release tag tracking from merged development -> main PR." \
            "" \
            "Repository: ${GITHUB_REPOSITORY}" \
            "Tag: ${TAG_NAME}" \
            "Bump source: ${BUMP_SOURCE}" \
            "Release URL: ${TAG_URL}" \
            "Commit SHA: ${MERGE_SHA}" \
            "Source PR: ${PR_URL}" \
            "PR number: #${PR_NUMBER}" \
            "PR title: ${PR_TITLE}" \
            "Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "Updated at (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)")"

          DELIMITER="EOF_$(date +%s)_$RANDOM"
          {
            echo "pr_number=${PR_NUMBER}"
            echo "tag_name=${TAG_NAME}"
            echo "tag_url=${TAG_URL}"
            echo "release_url=${RELEASE_URL}"
            echo "merge_sha=${MERGE_SHA}"
            echo "bump_source=${BUMP_SOURCE}"
            echo "linear_title=${LINEAR_TITLE}"
            echo "linear_description<<${DELIMITER}"
            echo "${LINEAR_DESCRIPTION}"
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing release PR mapping comment on PR
        id: release_mapping
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            const issueNumber = Number(`${{ steps.context.outputs.pr_number }}`);
            const markerId = /<!--\s*linear-release-ticket-id:([^\s>]+)\s*-->/i;
            const markerIdentifier = /<!--\s*linear-release-ticket-identifier:([^\s>]+)\s*-->/i;
            const markerUrl = /<!--\s*linear-release-ticket-url:([^\s>]+)\s*-->/i;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const found = comments.find((comment) => markerId.test(comment.body || ''));
            if (!found) {
              core.setOutput('linear_id', '');
              core.setOutput('linear_identifier', '');
              core.setOutput('linear_url', '');
              return;
            }

            const body = found.body || '';
            core.setOutput('linear_id', body.match(markerId)?.[1] || '');
            core.setOutput('linear_identifier', body.match(markerIdentifier)?.[1] || '');
            core.setOutput('linear_url', body.match(markerUrl)?.[1] || '');

      - name: Resolve Linear release-complete state id
        id: release_complete_state
        run: |
          GRAPHQL_PAYLOAD="$(jq -n \
            --arg teamId "$LINEAR_TEAM_ID" \
            '{
              query: "query($teamId:String!){ team(id:$teamId){ states{nodes{id name type}} } }",
              variables: { teamId: $teamId }
            }'
          )"

          RESPONSE="$(curl -sS -X POST "https://api.linear.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            --data-binary "$GRAPHQL_PAYLOAD")"

          # Prefer explicit "Closed" for release completion, then "Done", then any completed state.
          RELEASE_COMPLETE_STATE_ID="$(printf '%s' "$RESPONSE" | jq -r '.data.team.states.nodes[]? | select((.name | ascii_downcase) == "closed") | .id' | head -n 1)"
          if [ -z "$RELEASE_COMPLETE_STATE_ID" ] || [ "$RELEASE_COMPLETE_STATE_ID" = "null" ]; then
            RELEASE_COMPLETE_STATE_ID="$(printf '%s' "$RESPONSE" | jq -r '.data.team.states.nodes[]? | select((.name | ascii_downcase) == "done") | .id' | head -n 1)"
          fi
          if [ -z "$RELEASE_COMPLETE_STATE_ID" ] || [ "$RELEASE_COMPLETE_STATE_ID" = "null" ]; then
            RELEASE_COMPLETE_STATE_ID="$(printf '%s' "$RESPONSE" | jq -r '.data.team.states.nodes[]? | select(.type=="completed") | .id' | head -n 1)"
          fi
          if [ -z "$RELEASE_COMPLETE_STATE_ID" ] || [ "$RELEASE_COMPLETE_STATE_ID" = "null" ]; then
            echo "Could not resolve Closed/Done/completed state id for team ${LINEAR_TEAM_ID}."
            echo "$RESPONSE"
            exit 1
          fi

          echo "release_complete_state_id=${RELEASE_COMPLETE_STATE_ID}" >> "$GITHUB_OUTPUT"

      - name: Resolve release SHA (protected-main compatible)
        id: release_files
        env:
          TAG_NAME: ${{ steps.context.outputs.tag_name }}
          MERGE_SHA: ${{ steps.context.outputs.merge_sha }}
        run: |
          set -euo pipefail

          VERSION_VALUE="${TAG_NAME#v}"
          TARGET_VERSION="$(printf '%s' "$VERSION_VALUE" | grep -Eo '[0-9]+([.][0-9]+){0,2}' | head -n 1 || true)"
          if [ -z "$TARGET_VERSION" ]; then
            echo "Could not parse target version from ${TAG_NAME}."
            exit 1
          fi

          git fetch origin main --tags
          MAIN_HEAD="$(git rev-parse origin/main)"
          if [ "$MAIN_HEAD" != "$MERGE_SHA" ]; then
            echo "main has advanced beyond merge SHA (${MERGE_SHA}); tag/release will stay pinned to merge SHA."
          fi

          # main requires PR-based updates; do not attempt direct pushes from this workflow.
          # Keep release tagging deterministic by anchoring to the merged release commit.
          echo "release_files_action=skipped_protected_main_push" >> "$GITHUB_OUTPUT"
          echo "release_sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create tag if missing
        id: tag
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.context.outputs.tag_name }}
          RELEASE_SHA: ${{ steps.release_files.outputs.release_sha || steps.context.outputs.merge_sha }}
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            const tagName = process.env.TAG_NAME;
            const releaseSha = process.env.RELEASE_SHA;

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });
              core.info(`Tag ${tagName} already exists. Skipping creation.`);
              core.setOutput('tag_action', 'already_exists');
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: releaseSha,
            });

            core.info(`Created tag ${tagName} -> ${releaseSha}`);
            core.setOutput('tag_action', 'created');

      - name: Upsert Linear release tag issue
        id: linear_tag
        env:
          LINEAR_TITLE: ${{ steps.context.outputs.linear_title }}
          LINEAR_DESCRIPTION: ${{ steps.context.outputs.linear_description }}
          EXISTING_LINEAR_ID: ${{ steps.tag_mapping.outputs.linear_id }}
        run: |
          if [ -n "$EXISTING_LINEAR_ID" ]; then
            GRAPHQL_PAYLOAD="$(jq -n \
              --arg id "$EXISTING_LINEAR_ID" \
              --arg title "$LINEAR_TITLE" \
              --arg description "$LINEAR_DESCRIPTION" \
              '{
                query: "mutation($id:String!, $input: IssueUpdateInput!){ issueUpdate(id:$id,input:$input){ success issue { id identifier title url } } }",
                variables: {
                  id: $id,
                  input: {
                    title: $title,
                    description: $description
                  }
                }
              }'
            )"

            RESPONSE="$(curl -sS -X POST "https://api.linear.app/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              --data-binary "$GRAPHQL_PAYLOAD")"

            SUCCESS="$(printf '%s' "$RESPONSE" | jq -r '.data.issueUpdate.success // false')"
            if [ "$SUCCESS" != "true" ]; then
              echo "Linear issueUpdate failed:"
              echo "$RESPONSE"
              exit 1
            fi

            LINEAR_ID="$(printf '%s' "$RESPONSE" | jq -r '.data.issueUpdate.issue.id')"
            LINEAR_IDENTIFIER="$(printf '%s' "$RESPONSE" | jq -r '.data.issueUpdate.issue.identifier')"
            LINEAR_URL="$(printf '%s' "$RESPONSE" | jq -r '.data.issueUpdate.issue.url')"
            ACTION="updated"
          else
            GRAPHQL_PAYLOAD="$(jq -n \
              --arg teamId "$LINEAR_TEAM_ID" \
              --arg projectId "$LINEAR_PROJECT_ID" \
              --arg title "$LINEAR_TITLE" \
              --arg description "$LINEAR_DESCRIPTION" \
              '{
                query: "mutation($input: IssueCreateInput!){ issueCreate(input:$input){ success issue { id identifier title url } } }",
                variables: {
                  input: {
                    teamId: $teamId,
                    projectId: $projectId,
                    title: $title,
                    description: $description
                  }
                }
              }'
            )"

            RESPONSE="$(curl -sS -X POST "https://api.linear.app/graphql" \
              -H "Content-Type: application/json" \
              -H "Authorization: ${LINEAR_API_KEY}" \
              --data-binary "$GRAPHQL_PAYLOAD")"

            SUCCESS="$(printf '%s' "$RESPONSE" | jq -r '.data.issueCreate.success // false')"
            if [ "$SUCCESS" != "true" ]; then
              echo "Linear issueCreate failed:"
              echo "$RESPONSE"
              exit 1
            fi

            LINEAR_ID="$(printf '%s' "$RESPONSE" | jq -r '.data.issueCreate.issue.id')"
            LINEAR_IDENTIFIER="$(printf '%s' "$RESPONSE" | jq -r '.data.issueCreate.issue.identifier')"
            LINEAR_URL="$(printf '%s' "$RESPONSE" | jq -r '.data.issueCreate.issue.url')"
            ACTION="created"
          fi

          {
            echo "action=${ACTION}"
            echo "linear_id=${LINEAR_ID}"
            echo "linear_identifier=${LINEAR_IDENTIFIER}"
            echo "linear_url=${LINEAR_URL}"
          } >> "$GITHUB_OUTPUT"
          echo "linear_sync_tag_issue identifier=${LINEAR_IDENTIFIER} action=${ACTION}"

      - name: Create GitHub release if missing
        id: release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.context.outputs.tag_name }}
          RELEASE_SHA: ${{ steps.release_files.outputs.release_sha || steps.context.outputs.merge_sha }}
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            const tagName = process.env.TAG_NAME;
            const releaseSha = process.env.RELEASE_SHA;

            try {
              const existingRelease = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });
              core.info(`Release for ${tagName} already exists (#${existingRelease.data.id}). Skipping creation.`);
              core.setOutput('release_action', 'already_exists');
              core.setOutput('release_url', existingRelease.data.html_url || '');
              core.setOutput('release_id', String(existingRelease.data.id));
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const createdRelease = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: releaseSha,
              draft: false,
              generate_release_notes: true,
            });

            core.info(`Created release for ${tagName}: ${createdRelease.data.html_url}`);
            core.setOutput('release_action', 'created');
            core.setOutput('release_url', createdRelease.data.html_url || '');
            core.setOutput('release_id', String(createdRelease.data.id));

      - name: Close Linear release PR issue
        id: linear_release_close
        env:
          RELEASE_LINEAR_ID: ${{ steps.release_mapping.outputs.linear_id }}
          RELEASE_COMPLETE_STATE_ID: ${{ steps.release_complete_state.outputs.release_complete_state_id }}
        run: |
          if [ -z "$RELEASE_LINEAR_ID" ]; then
            echo "No release PR Linear mapping found; skipping closure."
            echo "action=skipped_no_mapping" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GRAPHQL_PAYLOAD="$(jq -n \
            --arg id "$RELEASE_LINEAR_ID" \
            --arg stateId "$RELEASE_COMPLETE_STATE_ID" \
            '{
              query: "mutation($id:String!, $input: IssueUpdateInput!){ issueUpdate(id:$id,input:$input){ success issue { id identifier title url } } }",
              variables: {
                id: $id,
                input: {
                  stateId: $stateId
                }
              }
            }'
          )"

          RESPONSE="$(curl -sS -X POST "https://api.linear.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: ${LINEAR_API_KEY}" \
            --data-binary "$GRAPHQL_PAYLOAD")"

          SUCCESS="$(printf '%s' "$RESPONSE" | jq -r '.data.issueUpdate.success // false')"
          if [ "$SUCCESS" != "true" ]; then
            echo "Linear issueUpdate (release close) failed:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "action=closed" >> "$GITHUB_OUTPUT"

      - name: Upsert PR comment with release tag status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            const issueNumber = Number(`${{ steps.context.outputs.pr_number }}`);
            const commentId = `${{ steps.tag_mapping.outputs.comment_id }}`;
            const linearId = `${{ steps.linear_tag.outputs.linear_id }}`;
            const linearIdentifier = `${{ steps.linear_tag.outputs.linear_identifier }}`;
            const linearUrl = `${{ steps.linear_tag.outputs.linear_url }}`;
            const linearAction = `${{ steps.linear_tag.outputs.action }}`;
            const releaseLinearIdentifier = `${{ steps.release_mapping.outputs.linear_identifier }}`;
            const releaseLinearUrl = `${{ steps.release_mapping.outputs.linear_url }}`;
            const releaseCloseAction = `${{ steps.linear_release_close.outputs.action }}`;
            const tagAction = `${{ steps.tag.outputs.tag_action }}`;
            const releaseAction = `${{ steps.release.outputs.release_action }}`;
            const releaseUrl = `${{ steps.release.outputs.release_url || steps.context.outputs.release_url }}`;
            const tagName = `${{ steps.context.outputs.tag_name }}`;
            const tagUrl = `${{ steps.context.outputs.tag_url }}`;

            const body = [
              `<!-- linear-release-tag-ticket-id:${linearId} -->`,
              `<!-- linear-release-tag-ticket-identifier:${linearIdentifier} -->`,
              `<!-- linear-release-tag-ticket-url:${linearUrl} -->`,
              'Release merge tag automation executed.',
              '',
              `- Tag: ${tagName}`,
              `- Tag URL: ${tagUrl}`,
              `- Tag action: ${tagAction}`,
              `- Release URL: ${releaseUrl}`,
              `- Release action: ${releaseAction}`,
              `- Linear tag action: ${linearAction}`,
              `- Linear tag ticket: ${linearIdentifier}`,
              `- Linear tag URL: ${linearUrl}`,
              `- Release PR ticket: ${releaseLinearIdentifier || 'not found'}`,
              `- Release PR ticket URL: ${releaseLinearUrl || 'n/a'}`,
              `- Release PR close action: ${releaseCloseAction}`,
            ].join('\n');

            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: Number(commentId),
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
